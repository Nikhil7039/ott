<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTT Dashboard - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- Modern SaaS Dark Theme Variables --- */
        :root {
            --bg-body: #0f172a; 
            --bg-container: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --bg-input: #0f172a;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
        }

        /* --- Base Styles & Global Animations --- */
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top center, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .login-container { 
            width: 100%;
            max-width: 420px; 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px var(--shadow-color); 
            animation: fadeInSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-sizing: border-box;
        }

        .login-header { text-align: center; margin-bottom: 35px; }

        .login-title {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .login-subtitle { color: var(--text-muted); font-size: 15px; margin: 0; }

        /* --- Form Styles --- */
        .input-wrapper { display: flex; flex-direction: column; margin-bottom: 20px; }
        .input-wrapper label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        
        input { 
            padding: 14px 16px; background-color: var(--bg-input); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 10px; 
            font-size: 16px; /* 16px prevents iOS auto-zoom */
            width: 100%; box-sizing: border-box; transition: all 0.3s ease; font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }

        button { 
            font-family: inherit; border: none; cursor: pointer; font-weight: 600; 
            border-radius: 10px; transition: all 0.2s ease; letter-spacing: 0.5px;
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
        }
        button:active { transform: scale(0.97); }

        .submit-btn { 
            background: var(--accent-blue); color: white; height: 50px; font-size: 16px; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); margin-top: 10px;
        }
        .submit-btn:hover { background: #2563eb; box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        /* --- Animated Toast Notification --- */
        .toast-notification {
            position: fixed;
            top: 25px;
            right: 25px;
            background: rgba(15, 23, 42, 0.95);
            border-left: 4px solid var(--accent-red);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            backdrop-filter: blur(10px);
            min-width: 250px;
            max-width: 90vw;
        }

        .toast-notification.show {
            transform: translateX(0);
        }

        .toast-icon {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-content {
            display: flex;
            flex-direction: column;
        }

        .toast-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* --- Mobile Optimizations --- */
        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .login-title { font-size: 24px; }
            .toast-notification {
                top: 15px;
                right: 15px;
                left: 15px;
                transform: translateY(-150%);
            }
            .toast-notification.show {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div id="errorToast" class="toast-notification">
        <div class="toast-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <div class="toast-content">
            <span class="toast-title">Authentication Failed</span>
            <span id="toastMessage" class="toast-message">Invalid credentials provided.</span>
        </div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">System Access</h1>
            <p class="login-subtitle">Sign in to manage client subscriptions</p>
        </div>

        <form id="loginForm">
            <div class="input-wrapper">
                <label>Email Address</label>
                <input type="email" id="adminEmail" placeholder="admin@example.com" required>
            </div>
            
            <div class="input-wrapper">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAK5nphCJF8KVWgNy1xpIhiCIUiGeJMlcU",
            authDomain: "ott-a49dd.firebaseapp.com",
            projectId: "ott-a49dd",
            storageBucket: "ott-a49dd.firebasestorage.app",
            messagingSenderId: "1084824993042",
            appId: "1:1084824993042:web:ab5db4e49f7da3ab5f07cb",
            measurementId: "G-20HKYBQV7D"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Toast Notification Logic
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('errorToast');
            document.getElementById('toastMessage').innerText = message;
            
            // Clear any existing timeout so it doesn't hide early if triggered repeatedly
            clearTimeout(toastTimeout);
            
            toast.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) { window.location.href = 'index.html'; }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const btn = e.target.querySelector('.submit-btn');
            
            btn.innerText = 'Signing in...';

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = 'index.html'; })
                .catch((error) => {
                    // Replaced native alert() with custom toast
                    showToast(error.message);
                    btn.innerText = 'Sign In';
                });
        });
    </script>
</body>
</html>
